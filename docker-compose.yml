services:
  sentinel:
    build: .
    container_name: sentinel
    restart: unless-stopped
    network_mode: host
    pid: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /:/host:ro
    environment:
      - HOST_PREFIX=/host
      - PORT=8080
      - STORAGE_SCAN_INTERVAL=3600
