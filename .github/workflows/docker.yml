name: Docker

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t sentinel:test .

      - name: Run container
        run: |
          docker run -d --name sentinel-test -p 8080:8080 sentinel:test
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/api/health >/dev/null; then
              break
            fi
            sleep 1
          done

      - name: API smoke test
        run: |
          curl -sf http://localhost:8080/api/health | grep -q '"status":"ok"'
          python3 - <<'PY'
          import json, urllib.request
          data = json.load(urllib.request.urlopen("http://localhost:8080/api/telemetry"))
          required = [
              "hostname", "processTree", "processCount", "publicIp", "processes",
              "history", "docker", "networkInterfaces", "listeningSockets",
          ]
          missing = [k for k in required if k not in data]
          if missing:
              raise SystemExit(f"Missing keys: {missing}")
          assert len(data["history"]["cpu"]) == 15
          assert len(data["history"]["timestamps"]) == 15
          print("telemetry ok")
          PY

      - name: Stop container
        if: always()
        run: docker rm -f sentinel-test

  publish:
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
